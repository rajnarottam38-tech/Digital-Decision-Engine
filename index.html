<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Decision Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Digital Decision Engine</h1>

<div class="panel">
  <h2>Add Option</h2>

  <input id="name" placeholder="Option Name">

  <input type="number" id="cost" placeholder="Cost">
  <input type="number" id="growth" placeholder="Growth">
  <input type="number" id="risk" placeholder="Risk">
  <input type="number" id="time" placeholder="Time">
  <input type="number" id="stability" placeholder="Stability">

  <button onclick="addOption()">Add Option</button>
</div>

<div class="panel">
  <h2>Criteria Importance</h2>

  Cost: <input type="range" id="wCost" min="0" max="1" step="0.05" value="0.2"><br>
  Growth: <input type="range" id="wGrowth" min="0" max="1" step="0.05" value="0.3"><br>
  Risk: <input type="range" id="wRisk" min="0" max="1" step="0.05" value="0.15"><br>
  Time: <input type="range" id="wTime" min="0" max="1" step="0.05" value="0.15"><br>
  Stability: <input type="range" id="wStability" min="0" max="1" step="0.05" value="0.2">
</div>

<button onclick="calculate()">Calculate Decision</button>

<div class="panel">
  <h2>Results</h2>
  <ul id="result"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
